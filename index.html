<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>실시간 마이크 비주얼라이저</title>
  <!-- UI 스타일링을 위한 Tailwind CSS -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    /* 캔버스 테두리에 은은한 네온 발광 효과 */
    .neon-glow {
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.15);
    }
  </style>
</head>
<body class="bg-gray-950 text-white flex items-center justify-center min-h-screen font-sans p-4 select-none">

  <!-- 전체 컨테이너 -->
  <div class="bg-gray-900 border border-gray-800 p-5 rounded-3xl shadow-2xl text-center w-full max-w-md flex flex-col justify-between min-h-[75vh] sm:min-h-0 space-y-5">
    
    <!-- 타이틀 영역 -->
    <div>
      <h1 class="text-2xl font-black mb-1 text-emerald-400 tracking-tight flex items-center justify-center gap-2">
        <span>📊</span> 소리 비주얼라이저
      </h1>
      <p class="text-gray-400 text-[11px] font-medium">아이폰 마이크 입력 & HTML5 Canvas 그래픽 연동</p>
    </div>

    <!-- 주파수 캔버스 영역 -->
    <div class="relative w-full aspect-[4/3] bg-gray-950 rounded-2xl overflow-hidden border border-gray-800 neon-glow flex items-center justify-center">
      <!-- 대기 상태 가이드 라인 (시작 전에만 보임) -->
      <div id="canvas-placeholder" class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center space-y-2 pointer-events-none">
        <span class="text-3xl animate-bounce">🎙️</span>
        <p class="text-xs text-gray-500">아래 '비주얼라이저 시작' 버튼을 눌러<br>마이크 권한을 허용해 주세요.</p>
      </div>
      <!-- 실제 실시간 그래픽이 그려질 도화지 -->
      <canvas id="visualizer-canvas" class="w-full h-full block"></canvas>
    </div>

    <!-- 제어 및 모드 선택 섹션 -->
    <div class="space-y-4">
      
      <!-- 3단 모드 토글 (막대형 / 파형 / 원형) -->
      <div class="grid grid-cols-3 bg-gray-950 p-1 rounded-xl border border-gray-800 text-[11px] font-bold">
        <button id="mode-bars" onclick="setVisualMode('bars')" class="py-2 rounded-lg transition duration-150 bg-emerald-500 text-gray-950 cursor-pointer">
          막대형
        </button>
        <button id="mode-wave" onclick="setVisualMode('wave')" class="py-2 rounded-lg transition duration-150 text-gray-400 hover:text-white cursor-pointer">
          파형
        </button>
        <button id="mode-circle" onclick="setVisualMode('circle')" class="py-2 rounded-lg transition duration-150 text-gray-400 hover:text-white cursor-pointer">
          원형 🔄
        </button>
      </div>

      <!-- 시작 / 정지 메인 버튼 -->
      <button id="start-btn" onclick="toggleVisualizer()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-gray-950 font-black py-4 px-6 rounded-2xl transition duration-150 text-base active:scale-[0.98] cursor-pointer shadow-lg shadow-emerald-500/10">
        비주얼라이저 시작하기 ⚡
      </button>

    </div>

    <!-- 푸터 상태 표시 -->
    <div id="status-footer" class="text-[10px] text-gray-500 border-t border-gray-800/60 pt-3">
      🔒 마이크 데이터를 외부 서버로 전송하지 않는 안전한 앱입니다.
    </div>

  </div>

  <!-- 🚨 경고 메시지 모달 -->
  <div id="error-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
    <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl max-w-xs w-full text-center shadow-2xl">
      <div class="text-3xl mb-2">⚠️</div>
      <h3 class="text-lg font-bold text-white mb-2">마이크 권한 필요</h3>
      <div id="error-message" class="text-xs text-gray-400 mb-6 leading-relaxed"></div>
      <button onclick="closeModal()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-gray-950 font-bold py-2.5 px-4 rounded-xl transition cursor-pointer text-sm">
        확인
      </button>
    </div>
  </div>

  <script>
    let audioCtx = null;
    let analyser = null;
    let sourceNode = null;
    let stream = null;
    let animationId = null;
    
    let isRunning = false;
    let visualMode = 'bars'; // 'bars', 'wave', 'circle'

    const canvas = document.getElementById('visualizer-canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('start-btn');
    const placeholder = document.getElementById('canvas-placeholder');
    const statusFooter = document.getElementById('status-footer');

    // 아이폰 Retina 디스플레이 픽셀 보정 함수
    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      
      ctx.scale(dpr, dpr);
    }

    window.addEventListener('resize', () => {
      if (isRunning) resizeCanvas();
    });

    // 비주얼라이저 핵심 엔진 구동
    async function toggleVisualizer() {
      if (isRunning) {
        stopVisualizer();
        return;
      }

      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        
        // 분석기 정밀도
        analyser.fftSize = 512; 

        sourceNode = audioCtx.createMediaStreamSource(stream);
        sourceNode.connect(analyser);

        isRunning = true;
        placeholder.style.opacity = '0'; 
        resizeCanvas();

        startBtn.textContent = '비주얼라이저 중지';
        startBtn.classList.replace('bg-emerald-500', 'bg-red-500');
        startBtn.classList.replace('hover:bg-emerald-600', 'hover:bg-red-600');
        statusFooter.innerHTML = "🎙️ 실시간 마이크 입력 감지 중...";
        statusFooter.classList.replace('text-gray-500', 'text-emerald-400');

        draw();

      } catch (err) {
        console.error("마이크 접근 실패:", err);
        showModal("아이폰 설정 -> Safari -> '마이크' 권한을 '허용'으로 변경하거나, 보안 주소(https://)를 사용해 주세요.");
      }
    }

    function stopVisualizer() {
      isRunning = false;
      
      if (animationId) {
        cancelAnimationFrame(animationId);
      }

      if (sourceNode) sourceNode.disconnect();
      if (audioCtx) audioCtx.close();
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }

      const rect = canvas.getBoundingClientRect();
      ctx.clearRect(0, 0, rect.width, rect.height);

      placeholder.style.opacity = '1';
      startBtn.textContent = '비주얼라이저 시작하기 ⚡';
      startBtn.classList.replace('bg-red-500', 'bg-emerald-500');
      startBtn.classList.replace('hover:bg-red-600', 'hover:bg-emerald-600');
      statusFooter.innerHTML = "🔒 마이크 데이터를 외부 서버로 전송하지 않는 안전한 앱입니다.";
      statusFooter.classList.replace('text-emerald-400', 'text-gray-500');
    }

    // ==========================================
    // 🎨 캔버스 실시간 렌더링 루프 (Draw)
    // ==========================================
    function draw() {
      if (!isRunning) return;

      animationId = requestAnimationFrame(draw);

      const rect = canvas.getBoundingClientRect();
      const width = rect.width;
      const height = rect.height;

      // 잔상 효과
      ctx.fillStyle = 'rgba(3, 7, 18, 0.25)'; 
      ctx.fillRect(0, 0, width, height);

      const bufferLength = analyser.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);

      if (visualMode === 'bars') {
        // --- 📊 1. 막대형(Frequency) 모드 ---
        analyser.getByteFrequencyData(dataArray);

        const barWidth = (width / bufferLength) * 1.5;
        let barHeight;
        let x = 0;

        for (let i = 0; i < bufferLength; i++) {
          barHeight = (dataArray[i] / 255) * height * 0.9;

          const r = 16 + (i * 4);
          const g = 185 - (i * 2);
          const b = 129 + (i * 4);
          ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;

          ctx.fillRect(x, height - barHeight, barWidth - 2, barHeight);
          x += barWidth;
        }
      } else if (visualMode === 'wave') {
        // --- 〰️ 2. 파형(Waveform) 모드 ---
        analyser.getByteTimeDomainData(dataArray);

        ctx.lineWidth = 3;
        ctx.strokeStyle = '#10b981'; 
        ctx.beginPath();

        const sliceWidth = width / bufferLength;
        let x = 0;

        for (let i = 0; i < bufferLength; i++) {
          const v = dataArray[i] / 128.0; 
          const y = (v * height) / 2;

          if (i === 0) {
            ctx.moveTo(x, y);
          } else {
            ctx.lineTo(x, y);
          }

          x += sliceWidth;
        }

        ctx.lineTo(width, height / 2);
        ctx.stroke();
      } else if (visualMode === 'circle') {
        // --- 🔄 3. 원형(Circular) 모드 (중심점 시작 스펙으로 수정) ---
        analyser.getByteFrequencyData(dataArray);

        const centerX = width / 2;
        const centerY = height / 2;

        // 수집된 주파수 데이터를 360도로 원형 배치하여 그리기
        for (let i = 0; i < bufferLength; i++) {
          const angle = (i / bufferLength) * Math.PI * 2; // 각 데이터 인덱스를 라디안 각도로 환산
          
          // 고주파수 영역은 소리가 작으므로 스케일을 곱해 시각 밸런스 조정
          const scale = i > bufferLength * 0.6 ? 1.5 : 1.0;
          // 중심점 시작에 맞추어 최대 반지름 비율을 0.28 -> 0.45로 확장
          const barLength = (dataArray[i] / 255) * (Math.min(width, height) * 0.45) * scale;

          // 시작점을 정중앙 구심점으로 고정
          const x1 = centerX;
          const y1 = centerY;

          // 끝점 (중심점에서 각도 방향으로 뻗어나가는 좌표 계산)
          const x2 = centerX + Math.cos(angle) * barLength;
          const y2 = centerY + Math.sin(angle) * barLength;

          // 주파수 대역 및 바 길이에 따른 컬러링
          const r = 16 + (i * 3);
          const g = 185 - Math.floor(barLength * 0.3); 
          const b = 129 + (i * 2);

          ctx.strokeStyle = `rgb(${r}, ${g}, ${b})`;
          ctx.lineWidth = 2.5;
          ctx.lineCap = 'round'; 

          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();
        }
      }
    }

    // ==========================================
    // 🎛️ 모드 체인지 및 팝업 모달 관리
    // ==========================================
    function setVisualMode(mode) {
      visualMode = mode;
      
      const btnBars = document.getElementById('mode-bars');
      const btnWave = document.getElementById('mode-wave');
      const btnCircle = document.getElementById('mode-circle');

      [btnBars, btnWave, btnCircle].forEach(btn => {
        btn.className = "py-2 rounded-lg transition duration-150 text-gray-400 hover:text-white cursor-pointer";
      });

      if (mode === 'bars') {
        btnBars.className = "py-2 rounded-lg transition duration-150 bg-emerald-500 text-gray-950 cursor-pointer";
      } else if (mode === 'wave') {
        btnWave.className = "py-2 rounded-lg transition duration-150 bg-emerald-500 text-gray-950 cursor-pointer";
      } else if (mode === 'circle') {
        btnCircle.className = "py-2 rounded-lg transition duration-150 bg-emerald-500 text-gray-950 cursor-pointer";
      }
    }

    function showModal(msg) {
      document.getElementById('error-message').innerHTML = msg;
      document.getElementById('error-modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('error-modal').classList.add('hidden');
    }
  </script>
</body>
</html>
