<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>실시간 마이크 비주얼라이저</title>
  <!-- UI 스타일링을 위한 Tailwind CSS -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    /* 캔버스 테두리에 은은한 네온 발광 효과 */
    .neon-glow {
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.15);
    }
  </style>
</head>
<body class="bg-gray-950 text-white flex items-center justify-center min-h-screen font-sans p-4 select-none">

  <!-- 전체 컨테이너 -->
  <div class="bg-gray-900 border border-gray-800 p-5 rounded-3xl shadow-2xl text-center w-full max-w-md flex flex-col justify-between min-h-[75vh] sm:min-h-0 space-y-5">
    
    <!-- 타이틀 영역 -->
    <div>
      <h1 class="text-2xl font-black mb-1 text-emerald-400 tracking-tight flex items-center justify-center gap-2">
        <span>📊</span> 소리 비주얼라이저
      </h1>
      <p class="text-gray-400 text-[11px] font-medium">아이폰 마이크 입력 & HTML5 Canvas 그래픽 연동</p>
    </div>

    <!-- 📌 주파수 캔버스 영역 -->
    <div class="relative w-full aspect-[4/3] bg-gray-950 rounded-2xl overflow-hidden border border-gray-800 neon-glow flex items-center justify-center">
      <!-- 대기 상태 가이드 라인 (시작 전에만 보임) -->
      <div id="canvas-placeholder" class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center space-y-2 pointer-events-none">
        <span class="text-3xl animate-bounce">🎙️</span>
        <p class="text-xs text-gray-500">아래 '비주얼라이저 시작' 버튼을 눌러<br>마이크 권한을 허용해 주세요.</p>
      </div>
      <!-- 실제 실시간 그래픽이 그려질 도화지 -->
      <canvas id="visualizer-canvas" class="w-full h-full block"></canvas>
    </div>

    <!-- 제어 및 모드 선택 섹션 -->
    <div class="space-y-4">
      
      <!-- 비주얼 모드 토글 (막대형 / 선형) -->
      <div class="flex bg-gray-950 p-1 rounded-xl border border-gray-800">
        <button id="mode-bars" onclick="setVisualMode('bars')" class="flex-1 py-2 text-xs font-bold rounded-lg transition duration-150 bg-emerald-500 text-gray-950 cursor-pointer">
          막대형 (Frequency)
        </button>
        <button id="mode-wave" onclick="setVisualMode('wave')" class="flex-1 py-2 text-xs font-bold rounded-lg transition duration-150 text-gray-400 hover:text-white cursor-pointer">
          파형 (Waveform)
        </button>
      </div>

      <!-- 시작 / 정지 메인 버튼 -->
      <button id="start-btn" onclick="toggleVisualizer()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-gray-950 font-black py-4 px-6 rounded-2xl transition duration-150 text-base active:scale-[0.98] cursor-pointer shadow-lg shadow-emerald-500/10">
        비주얼라이저 시작하기 ⚡
      </button>

    </div>

    <!-- 푸터 상태 표시 -->
    <div id="status-footer" class="text-[10px] text-gray-500 border-t border-gray-800/60 pt-3">
      🔒 마이크 데이터를 외부 서버로 전송하지 않는 안전한 앱입니다.
    </div>

  </div>

  <!-- 🚨 경고 메시지 모달 -->
  <div id="error-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
    <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl max-w-xs w-full text-center shadow-2xl">
      <div class="text-3xl mb-2">⚠️</div>
      <h3 class="text-lg font-bold text-white mb-2">마이크 권한 필요</h3>
      <div id="error-message" class="text-xs text-gray-400 mb-6 leading-relaxed"></div>
      <button onclick="closeModal()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-gray-950 font-bold py-2.5 px-4 rounded-xl transition cursor-pointer text-sm">
        확인
      </button>
    </div>
  </div>

  <script>
    // ==========================================
    // ⚙️ 오디오 및 그래픽 전역 상태 변수
    // ==========================================
    let audioCtx = null;
    let analyser = null;
    let sourceNode = null;
    let stream = null;
    let animationId = null;
    
    let isRunning = false;
    let visualMode = 'bars'; // 'bars' (막대) 또는 'wave' (파형)

    const canvas = document.getElementById('visualizer-canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('start-btn');
    const placeholder = document.getElementById('canvas-placeholder');
    const statusFooter = document.getElementById('status-footer');

    // ==========================================
    // 📱 [핵심] 아이폰 Retina 디스플레이 픽셀 보정 함수
    // ==========================================
    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      
      // 화면 물리 픽셀 크기에 맞춰 해상도를 뻥튀기 해줍니다 (아이폰 화면에서 안 번지게 하는 마법)
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      
      // CSS 크기는 원래대로 유지하여 레이아웃을 고정합니다
      ctx.scale(dpr, dpr);
    }

    // 창 크기 변경 시 해상도 재보정 연동
    window.addEventListener('resize', () => {
      if (isRunning) resizeCanvas();
    });

    // ==========================================
    // 🎙️ 비주얼라이저 핵심 엔진 구동
    // ==========================================
    async function toggleVisualizer() {
      if (isRunning) {
        stopVisualizer();
        return;
      }

      try {
        // 1. 아이폰 전면 마이크 접근 허용 요청
        stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });

        // 2. 오디오 콘텍스트 생성 (iOS 오동작 방지를 위해 사용자 터치 이벤트 직속 실행 필수)
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        
        // FFT Size: 주파수 분석 정밀도 (모바일 성능을 위해 256 혹은 512 추천)
        analyser.fftSize = 256; 

        // 3. 마이크 소리 데이터를 분석기에 꽂아주기
        sourceNode = audioCtx.createMediaStreamSource(stream);
        sourceNode.connect(analyser);

        // 4. 앱 상태 변화 및 그래픽 도화지 세팅
        isRunning = true;
        placeholder.style.opacity = '0'; // 가이드 숨기기
        resizeCanvas();

        startBtn.textContent = '비주얼라이저 중지';
        startBtn.classList.replace('bg-emerald-500', 'bg-red-500');
        startBtn.classList.replace('hover:bg-emerald-600', 'hover:bg-red-600');
        statusFooter.innerHTML = "🎙️ 실시간 마이크 입력 감지 중...";
        statusFooter.classList.replace('text-gray-500', 'text-emerald-400');

        // 5. 프레임 드로잉 시작!
        draw();

      } catch (err) {
        console.error("마이크 접근 실패:", err);
        showModal("아이폰 설정 -> Safari -> '마이크' 권한을 '허용'으로 변경하거나, 보안 주소(https://)를 사용해 주세요.");
      }
    }

    // 비주얼라이저 안전하게 끄기
    function stopVisualizer() {
      isRunning = false;
      
      // 애니메이션 프레임 중단
      if (animationId) {
        cancelAnimationFrame(animationId);
      }

      // 오디오 노드 및 마이크 스트림 연결 차단
      if (sourceNode) sourceNode.disconnect();
      if (audioCtx) audioCtx.close();
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }

      // 캔버스 깨끗하게 비우기
      const rect = canvas.getBoundingClientRect();
      ctx.clearRect(0, 0, rect.width, rect.height);

      // UI 원상복구
      placeholder.style.opacity = '1';
      startBtn.textContent = '비주얼라이저 시작하기 ⚡';
      startBtn.classList.replace('bg-red-500', 'bg-emerald-500');
      startBtn.classList.replace('hover:bg-red-600', 'hover:bg-emerald-600');
      statusFooter.innerHTML = "🔒 마이크 데이터를 외부 서버로 전송하지 않는 안전한 앱입니다.";
      statusFooter.classList.replace('text-emerald-400', 'text-gray-500');
    }

    // ==========================================
    // 🎨 캔버스 실시간 렌더링 루프 (Draw)
    // ==========================================
    function draw() {
      if (!isRunning) return;

      // 주기를 도는 루프 생성
      animationId = requestAnimationFrame(draw);

      const rect = canvas.getBoundingClientRect();
      const width = rect.width;
      const height = rect.height;

      // 캔버스 잔상 효과 구현 (지우는 투명도를 낮춰 꼬리가 남는 듯한 고급 피드백 연출)
      ctx.fillStyle = 'rgba(3, 7, 18, 0.25)'; // gray-950 색상에 살짝 알파 투명도 적용
      ctx.fillRect(0, 0, width, height);

      const bufferLength = analyser.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);

      if (visualMode === 'bars') {
        // --- 📊 1. 막대형(Frequency) 모드 그리기 ---
        analyser.getByteFrequencyData(dataArray); // 주파수 크기 수집

        const barWidth = (width / bufferLength) * 1.5;
        let barHeight;
        let x = 0;

        for (let i = 0; i < bufferLength; i++) {
          barHeight = (dataArray[i] / 255) * height * 0.9;

          // 저음에서 고음으로 갈수록 청록색에서 보라색으로 변하는 그라데이션 컬러링
          const r = 16 + (i * 4);
          const g = 185 - (i * 2);
          const b = 129 + (i * 4);
          ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;

          // 둥근 사각형 기법으로 막대 그리기
          ctx.fillRect(x, height - barHeight, barWidth - 2, barHeight);
          x += barWidth;
        }
      } else {
        // --- 〰️ 2. 파형(Waveform) 모드 그리기 ---
        analyser.getByteTimeDomainData(dataArray); // 시간에 따른 진폭 수집

        ctx.lineWidth = 3;
        ctx.strokeStyle = '#10b981'; // emerald-500
        ctx.beginPath();

        const sliceWidth = width / bufferLength;
        let x = 0;

        for (let i = 0; i < bufferLength; i++) {
          const v = dataArray[i] / 128.0; // 진폭 범위 환산
          const y = (v * height) / 2;

          if (i === 0) {
            ctx.moveTo(x, y);
          } else {
            ctx.lineTo(x, y);
          }

          x += sliceWidth;
        }

        ctx.lineTo(width, height / 2);
        ctx.stroke();
      }
    }

    // ==========================================
    // 🎛️ 모드 체인지 및 팝업 모달 관리
    // ==========================================
    function setVisualMode(mode) {
      visualMode = mode;
      const btnBars = document.getElementById('mode-bars');
      const btnWave = document.getElementById('mode-wave');

      if (mode === 'bars') {
        btnBars.className = "flex-1 py-2 text-xs font-bold rounded-lg transition duration-150 bg-emerald-500 text-gray-950 cursor-pointer";
        btnWave.className = "flex-1 py-2 text-xs font-bold rounded-lg transition duration-150 text-gray-400 hover:text-white cursor-pointer";
      } else {
        btnBars.className = "flex-1 py-2 text-xs font-bold rounded-lg transition duration-150 text-gray-400 hover:text-white cursor-pointer";
        btnWave.className = "flex-1 py-2 text-xs font-bold rounded-lg transition duration-150 bg-emerald-500 text-gray-950 cursor-pointer";
      }
    }

    function showModal(msg) {
      document.getElementById('error-message').innerHTML = msg;
      document.getElementById('error-modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('error-modal').classList.add('hidden');
    }
  </script>
</body>
</html>
